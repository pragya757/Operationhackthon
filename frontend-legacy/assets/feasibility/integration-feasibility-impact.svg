<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="70" x2="1320" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FCFD"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="phone" x1="250" y1="240" x2="680" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173753"/>
      <stop offset="1" stop-color="#0D2234"/>
    </linearGradient>
    <linearGradient id="green" x1="820" y1="310" x2="1150" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B1EDC9"/>
      <stop offset="1" stop-color="#189267"/>
    </linearGradient>
    <filter id="shadow" x="70" y="70" width="1260" height="760" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#16314B" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #168C66; letter-spacing: 1.5px; }
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .sub { font: 500 25px 'Segoe UI', Arial, sans-serif; fill: #5A7388; }
      .chip { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #264861; letter-spacing: 1px; }
      .screen { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #264861; }
      .metric { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .small { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #61798B; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="80" y="80" width="1240" height="740" rx="40" fill="url(#bg)"/>
  </g>

  <text x="140" y="150" class="kicker">EASY TO USE</text>
  <text x="140" y="220" class="title">Users Just Forward It</text>
  <text x="140" y="265" class="sub">A WhatsApp bot or webhook lets users send suspicious content without learning a new tool.</text>

  <g>
    <rect x="176" y="270" width="430" height="458" rx="58" fill="url(#phone)"/>
    <rect x="210" y="304" width="362" height="390" rx="34" fill="#F5FBFC"/>
    <rect x="332" y="286" width="118" height="14" rx="7" fill="#D8E5EC" opacity="0.45"/>

    <rect x="250" y="344" width="190" height="62" rx="31" fill="#E6F4EE"/>
    <text x="345" y="384" text-anchor="middle" class="screen">Incoming message</text>

    <rect x="250" y="438" width="246" height="78" rx="28" fill="#EFF4F7"/>
    <text x="274" y="475" class="screen">Forward suspicious URL,</text>
    <text x="274" y="503" class="screen">voice note, or file</text>

    <rect x="304" y="556" width="206" height="86" rx="28" fill="#DFF4EB"/>
    <circle cx="350" cy="600" r="22" fill="#21A069"/>
    <path d="M340 600L348 608L363 592" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="384" y="594" class="screen">Threat Score: 92</text>
    <text x="384" y="622" class="screen">High Risk</text>
  </g>

  <g>
    <circle cx="952" cy="468" r="108" fill="#F2FAF5"/>
    <circle cx="952" cy="468" r="84" fill="url(#green)"/>
    <path d="M916 424H988C1008 424 1024 440 1024 460V510C1024 530 1008 546 988 546H964L938 574L944 544H916C896 544 880 528 880 508V460C880 440 896 424 916 424Z" stroke="white" stroke-width="10" stroke-linejoin="round"/>
    <path d="M914 468H990" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <path d="M914 500H962" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <path d="M608 470H804" stroke="#62C8B4" stroke-width="12" stroke-linecap="round"/>
    <path d="M780 444L818 470L780 496" fill="none" stroke="#62C8B4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="860" y="652" class="metric">Why it is feasible:</text>
  <text x="860" y="698" class="small">It fits how users already share suspicious messages, links, and files.</text>

  <g>
    <rect x="140" y="734" width="250" height="54" rx="27" fill="#E6F3F0"/>
    <text x="265" y="769" text-anchor="middle" class="chip">WHATSAPP FLOW</text>
    <rect x="414" y="734" width="250" height="54" rx="27" fill="#E7F0F5"/>
    <text x="539" y="769" text-anchor="middle" class="chip">WEBHOOK-READY</text>
    <rect x="688" y="734" width="278" height="54" rx="27" fill="#E7F0F5"/>
    <text x="827" y="769" text-anchor="middle" class="chip">REAL USER UX</text>
  </g>
</svg>
