<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="70" x2="1320" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FCFD"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="green" x1="820" y1="300" x2="1160" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B1EDC9"/>
      <stop offset="1" stop-color="#189267"/>
    </linearGradient>
    <filter id="shadow" x="70" y="70" width="1260" height="760" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#16314B" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #168C66; letter-spacing: 1.5px; }
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .sub { font: 500 25px 'Segoe UI', Arial, sans-serif; fill: #5A7388; }
      .chip { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #264861; letter-spacing: 1px; }
      .metric { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .small { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #61798B; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="80" y="80" width="1240" height="740" rx="40" fill="url(#bg)"/>
  </g>

  <text x="140" y="150" class="kicker">AFFORDABLE TO RUN</text>
  <text x="140" y="220" class="title">Only Needed Modules Activate</text>
  <text x="140" y="265" class="sub">Smart routing lowers compute cost by running only the detectors that matter for each input.</text>

  <g>
    <rect x="170" y="356" width="220" height="74" rx="26" fill="#E7F3EF"/>
    <text x="280" y="401" text-anchor="middle" class="chip">Incoming Signal</text>

    <rect x="446" y="314" width="224" height="78" rx="28" fill="#FFFFFF"/>
    <text x="558" y="360" text-anchor="middle" class="chip">Central Classifier</text>

    <rect x="446" y="432" width="184" height="62" rx="24" fill="#EAF3F7"/>
    <text x="538" y="471" text-anchor="middle" class="chip">Text</text>
    <rect x="652" y="432" width="184" height="62" rx="24" fill="#EAF3F7"/>
    <text x="744" y="471" text-anchor="middle" class="chip">URL</text>
    <rect x="858" y="432" width="184" height="62" rx="24" fill="#EAF3F7"/>
    <text x="950" y="471" text-anchor="middle" class="chip">Voice</text>

    <path d="M390 393H430" stroke="#63C7B4" stroke-width="10" stroke-linecap="round"/>
    <path d="M558 392V420" stroke="#63C7B4" stroke-width="10" stroke-linecap="round"/>
    <path d="M744 392V420" stroke="#63C7B4" stroke-width="10" stroke-linecap="round"/>
    <path d="M930 392V420" stroke="#63C7B4" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="860" y="262" width="330" height="118" rx="30" fill="#FFFFFF"/>
    <text x="896" y="326" class="metric">High signal,</text>
    <text x="896" y="364" class="metric">lower cost</text>
  </g>

  <g>
    <circle cx="1098" cy="586" r="96" fill="#F2FAF5"/>
    <circle cx="1098" cy="586" r="70" fill="url(#green)"/>
    <path d="M1066 594L1086 574L1110 598L1136 556" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1024 650C1044 632 1062 626 1086 626C1120 626 1148 604 1166 570" stroke="#2A597C" stroke-width="14" stroke-linecap="round"/>
  </g>

  <text x="860" y="652" class="metric">Why it is feasible:</text>
  <text x="860" y="698" class="small">Efficient enough for demos now and scalable enough for real deployment later.</text>

  <g>
    <rect x="140" y="734" width="268" height="54" rx="27" fill="#E6F3F0"/>
    <text x="274" y="769" text-anchor="middle" class="chip">SMART ROUTING</text>
    <rect x="432" y="734" width="296" height="54" rx="27" fill="#E7F0F5"/>
    <text x="580" y="769" text-anchor="middle" class="chip">LOWER RUN COST</text>
    <rect x="752" y="734" width="322" height="54" rx="27" fill="#E7F0F5"/>
    <text x="913" y="769" text-anchor="middle" class="chip">PRACTICAL TO SCALE</text>
  </g>
</svg>
