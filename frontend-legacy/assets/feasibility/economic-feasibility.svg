<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="90" x2="1040" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCFD"/>
      <stop offset="1" stop-color="#EEF5F8"/>
    </linearGradient>
    <linearGradient id="teal" x1="280" y1="310" x2="820" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ED4CC"/>
      <stop offset="1" stop-color="#2A577D"/>
    </linearGradient>
    <linearGradient id="green" x1="750" y1="280" x2="980" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A1E8C7"/>
      <stop offset="1" stop-color="#189467"/>
    </linearGradient>
    <filter id="shadow" x="70" y="70" width="1060" height="760" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#214766" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 48px 'Segoe UI', Arial, sans-serif; fill: #162235; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #547085; }
      .chip { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #24455E; letter-spacing: 1px; }
      .small { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #5B7284; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="1020" height="720" rx="40" fill="url(#bg)"/>
  </g>

  <text x="150" y="170" class="title">Economic Feasibility</text>
  <text x="150" y="212" class="subtitle">Efficient routing keeps cost low while preserving high-value fraud detection</text>

  <g>
    <polygon points="340,610 520,520 700,610 520,700" fill="#E4EEF2"/>
    <polygon points="340,610 340,570 520,480 520,520" fill="#D3E3EA"/>
    <polygon points="520,520 520,480 700,570 700,610" fill="#C7DCE4"/>
    <rect x="500" y="362" width="40" height="140" rx="18" fill="#294D69"/>

    <polygon points="330,480 520,400 710,480 520,560" fill="url(#teal)"/>
    <polygon points="330,480 330,450 520,370 520,400" fill="#3C6883"/>
    <polygon points="520,400 520,370 710,450 710,480" fill="#315876"/>

    <path d="M520 250V365" stroke="#6AC5B2" stroke-width="14" stroke-linecap="round"/>
    <path d="M520 250L468 300" stroke="#6AC5B2" stroke-width="14" stroke-linecap="round"/>
    <path d="M520 250L572 300" stroke="#6AC5B2" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="760" y="330" width="170" height="140" rx="28" fill="#FFFFFF"/>
    <rect x="784" y="408" width="24" height="34" rx="8" fill="#9EE6C5"/>
    <rect x="820" y="386" width="24" height="56" rx="8" fill="#7CD7C6"/>
    <rect x="856" y="356" width="24" height="86" rx="8" fill="#3C6F8E"/>
    <path d="M790 360L840 320L900 340" stroke="url(#green)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M879 334L900 340L888 359" stroke="#1D8A61" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <circle cx="286" cy="430" r="86" fill="#F1FAF5"/>
    <circle cx="286" cy="430" r="62" fill="url(#green)"/>
    <path d="M258 430H314" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <path d="M286 402V458" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="150" y="700" width="260" height="46" rx="23" fill="#E6F1F4"/>
    <text x="280" y="730" text-anchor="middle" class="chip">SMART ROUTING</text>
    <rect x="430" y="700" width="250" height="46" rx="23" fill="#E6F1F4"/>
    <text x="555" y="730" text-anchor="middle" class="chip">LOWER INFERENCE COST</text>
    <rect x="700" y="700" width="250" height="46" rx="23" fill="#E6F1F4"/>
    <text x="825" y="730" text-anchor="middle" class="chip">HIGH SIGNAL OUTPUT</text>
  </g>

  <text x="600" y="640" text-anchor="middle" class="small">Only the necessary detectors activate, keeping the system practical to run</text>
</svg>
