<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="80" x2="1040" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FCFD"/>
      <stop offset="1" stop-color="#EEF5F8"/>
    </linearGradient>
    <linearGradient id="phone" x1="310" y1="220" x2="650" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E4362"/>
      <stop offset="1" stop-color="#0D2234"/>
    </linearGradient>
    <linearGradient id="screen" x1="342" y1="235" x2="628" y2="676" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCFD"/>
      <stop offset="1" stop-color="#EBF5F7"/>
    </linearGradient>
    <linearGradient id="green" x1="720" y1="320" x2="960" y2="560" gradientUnits="userSpaceOnUse">
