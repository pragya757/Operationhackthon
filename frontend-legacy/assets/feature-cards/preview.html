<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feature Card Preview</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: linear-gradient(180deg, #f5f9fb 0%, #e8f0f4 100%);
        font-family: "Segoe UI", Arial, sans-serif;
      }
      h1 {
        max-width: 1060px;
        margin: 0 auto 24px;
        color: #183149;
        font-size: 28px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 520px));
        gap: 24px;
        justify-content: center;
      }
      img {
        width: 520px;
        height: 220px;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Fraud Shield AI Feature Cards</h1>
    <div class="grid">
      <img src="./text-analysis-card.svg" alt="Text Analysis" />
      <img src="./credential-detection-card.svg" alt="Credential Detection" />
      <img src="./url-sandbox-card.svg" alt="URL Sandbox" />
      <img src="./voice-fraud-detection-card.svg" alt="Voice Fraud Detection" />
      <img src="./video-deepfake-detection-card.svg" alt="Video Deepfake Detection" />
      <img src="./file-attachment-scan-card.svg" alt="File and Attachment Scan" />
      <img src="./self-protecting-ai-card.svg" alt="Self-Protecting AI" />
    </div>
  </body>
</html>
