  <text x="158" y="440" class="feature">Deepfake-Aware Protection</text>
  <text x="158" y="498" class="feature">Prompt Injection Defense</text>
  <text x="158" y="556" class="feature">DLP / Output Leak Protection</text>
  <text x="158" y="614" class="feature">Unified Multi-Channel Coverage</text>
  <text x="158" y="672" class="feature">Human Feedback Learning Loop</text>
  <text x="158" y="730" class="feature">Threat Score With Reasoning</text>

  <!-- Truecaller -->
  <text x="494" y="324" text-anchor="middle" class="cross">✕</text>
  <text x="494" y="382" text-anchor="middle" class="cell">Caller ID only</text>
  <text x="494" y="440" text-anchor="middle" class="cross">✕</text>
  <text x="494" y="498" text-anchor="middle" class="cross">✕</text>
  <text x="494" y="556" text-anchor="middle" class="cross">✕</text>
  <text x="494" y="614" text-anchor="middle" class="cell">Partial</text>
  <text x="494" y="672" text-anchor="middle" class="cell">Report spam</text>
  <text x="494" y="730" text-anchor="middle" class="cross">✕</text>

  <!-- Gmail -->
  <text x="685" y="324" text-anchor="middle" class="cross">✕</text>
  <text x="685" y="382" text-anchor="middle" class="cross">✕</text>
  <text x="685" y="440" text-anchor="middle" class="cross">✕</text>
  <text x="685" y="498" text-anchor="middle" class="cross">✕</text>
  <text x="685" y="556" text-anchor="middle" class="cross">✕</text>
  <text x="685" y="614" text-anchor="middle" class="cell">Email only</text>
  <text x="685" y="672" text-anchor="middle" class="cell">Report spam</text>
  <text x="685" y="730" text-anchor="middle" class="cell">Basic</text>

  <!-- Antivirus -->
  <text x="876" y="324" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="382" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="440" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="498" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="556" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="614" text-anchor="middle" class="cell">Files only</text>
  <text x="876" y="672" text-anchor="middle" class="cross">✕</text>
  <text x="876" y="730" text-anchor="middle" class="cell">Signature-based</text>

  <!-- Zora AI -->
  <text x="1096" y="324" text-anchor="middle" class="cross">✕</text>
  <text x="1096" y="382" text-anchor="middle" class="tick">✓</text>
  <text x="1096" y="440" text-anchor="middle" class="cell">Voice only</text>
  <text x="1096" y="498" text-anchor="middle" class="tick">✓</text>
  <text x="1096" y="556" text-anchor="middle" class="cross">✕</text>
  <text x="1096" y="614" text-anchor="middle" class="cell">Strong</text>
  <text x="1096" y="672" text-anchor="middle" class="cross">✕</text>
  <text x="1096" y="730" text-anchor="middle" class="cell">Partial</text>

  <!-- Fraud Shield AI -->
  <text x="1336" y="324" text-anchor="middle" class="tick">✓</text>
  <text x="1336" y="382" text-anchor="middle" class="tick">✓</text>
  <text x="1336" y="440" text-anchor="middle" class="cellStrong">Voice + Video Roadmap</text>
  <text x="1336" y="498" text-anchor="middle" class="tick">✓</text>
  <text x="1336" y="556" text-anchor="middle" class="tick">✓</text>
  <text x="1336" y="614" text-anchor="middle" class="cellStrong">Text, Email, URL, Voice, File</text>
  <text x="1336" y="672" text-anchor="middle" class="tick">✓</text>
  <text x="1336" y="730" text-anchor="middle" class="cellStrong">Full score + reasoning</text>

  <!-- footer callout -->
  <rect x="370" y="806" width="860" height="54" rx="27" fill="#F2FBF7" stroke="#B9E8D0" stroke-width="2"/>
  <text x="800" y="840" text-anchor="middle" class="footer" fill="#183149">Others detect known scams. Fraud Shield AI detects scam behavior in real time.</text>
</svg>
