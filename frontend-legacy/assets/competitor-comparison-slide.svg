<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FA9AE"/>
      <stop offset="0.55" stop-color="#3D6881"/>
      <stop offset="1" stop-color="#2D5374"/>
    </linearGradient>
    <linearGradient id="highlight" x1="1260" y1="156" x2="1505" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8FFF0"/>
      <stop offset="1" stop-color="#B7F1D3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#183149" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .subtle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #E8F4F8; }
      .head { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #183149; }
      .headInv { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .cell { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #29465F; }
      .cellStrong { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #21455C; }
      .feature { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #183149; }
      .tick { font: 700 20px 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif; fill: #0B8F52; }
      .cross { font: 700 18px 'Segoe UI Symbol', 'Segoe UI', Arial, sans-serif; fill: #D85A6A; }
      .muted { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #7B94A6; }
      .footer { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

