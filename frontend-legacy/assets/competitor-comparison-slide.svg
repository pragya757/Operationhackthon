  <text x="800" y="138" text-anchor="middle" class="subtle">Competitor comparison across real-world scam defense capabilities</text>

  <g filter="url(#shadow)">
    <rect x="108" y="176" width="1384" height="614" rx="28" fill="#F7FBFD"/>
  </g>

  <!-- top headers -->
  <rect x="140" y="208" width="250" height="58" rx="16" fill="#D9E8EE"/>
  <rect x="406" y="208" width="175" height="58" rx="16" fill="#D9E8EE"/>
  <rect x="597" y="208" width="175" height="58" rx="16" fill="#D9E8EE"/>
  <rect x="788" y="208" width="175" height="58" rx="16" fill="#D9E8EE"/>
  <rect x="979" y="208" width="233" height="58" rx="16" fill="#D9E8EE"/>
  <rect x="1228" y="194" width="232" height="86" rx="24" fill="url(#highlight)" stroke="#8AD1B0" stroke-width="2"/>

  <text x="265" y="244" text-anchor="middle" class="head">Feature</text>
  <text x="494" y="244" text-anchor="middle" class="head">Truecaller</text>
  <text x="685" y="244" text-anchor="middle" class="head">Gmail</text>
  <text x="876" y="244" text-anchor="middle" class="head">Antivirus</text>
  <text x="1096" y="244" text-anchor="middle" class="head">Zora AI</text>
  <text x="1344" y="232" text-anchor="middle" class="head">Fraud Shield AI</text>
  <text x="1344" y="254" text-anchor="middle" class="muted">Highlighted advantage</text>

  <!-- table grid -->
  <rect x="140" y="288" width="1320" height="468" rx="20" fill="#FFFFFF" stroke="#D7E3EA" stroke-width="2"/>

  <!-- row separators -->
  <line x1="140" y1="346" x2="1460" y2="346" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="404" x2="1460" y2="404" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="462" x2="1460" y2="462" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="520" x2="1460" y2="520" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="578" x2="1460" y2="578" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="636" x2="1460" y2="636" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="140" y1="694" x2="1460" y2="694" stroke="#E4EDF2" stroke-width="2"/>

  <!-- vertical separators -->
  <line x1="390" y1="288" x2="390" y2="756" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="581" y1="288" x2="581" y2="756" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="772" y1="288" x2="772" y2="756" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="963" y1="288" x2="963" y2="756" stroke="#E4EDF2" stroke-width="2"/>
  <line x1="1212" y1="288" x2="1212" y2="756" stroke="#E4EDF2" stroke-width="2"/>

