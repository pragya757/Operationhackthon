<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCFD"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="180" x2="520" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9EE6C5"/>
      <stop offset="1" stop-color="#2D597D"/>
    </linearGradient>
    <filter id="shadow" x="50" y="50" width="1100" height="600" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#17314B" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #168C66; letter-spacing: 1.5px; }
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .body { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #5A7388; }
      .metric { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #142235; }
    </style>
  </defs>
  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="560" rx="38" fill="url(#bg)"/>
  </g>
  <text x="120" y="140" class="kicker">SAFE ANALYSIS</text>
  <text x="120" y="208" class="title">Secure Sandbox</text>
  <text x="120" y="254" class="body">
    <tspan x="120" dy="0">Docker-isolated sandboxing checks</tspan>
    <tspan x="120" dy="30">malicious links without user risk.</tspan>
  </text>
  <rect x="170" y="330" width="300" height="210" rx="32" fill="#F1F8FB"/>
  <rect x="205" y="370" width="230" height="130" rx="24" fill="url(#accent)"/>
  <path d="M300 412H340" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <path d="M255 446H385" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <path d="M255 478H345" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <rect x="630" y="352" width="340" height="170" rx="28" fill="#FFFFFF"/>
  <text x="668" y="418" class="metric">
    <tspan x="668" dy="0">Open dangerous links</tspan>
    <tspan x="668" dy="40">without user risk.</tspan>
  </text>
</svg>
