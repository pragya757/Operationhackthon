<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCFD"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="190" x2="520" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9EE6C5"/>
      <stop offset="1" stop-color="#2D597D"/>
    </linearGradient>
    <filter id="shadow" x="50" y="50" width="1100" height="600" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#17314B" flood-opacity="0.14"/>
    </filter>
    <style>
      .kicker { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #168C66; letter-spacing: 1.5px; }
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .body { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #5A7388; }
      .metric { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #142235; }
      .chip { font: 800 22px 'Segoe UI', Arial, sans-serif; fill: #264861; }
    </style>
  </defs>
  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="560" rx="38" fill="url(#bg)"/>
  </g>
  <text x="120" y="140" class="kicker">SCALABLE INTELLIGENCE</text>
  <text x="120" y="208" class="title">Scalable Hybrid AI</text>
  <text x="120" y="254" class="body">
    <tspan x="120" dy="0">High accuracy from layered models</tspan>
    <tspan x="120" dy="30">without full-model cost every time.</tspan>
  </text>
  <rect x="150" y="350" width="210" height="80" rx="30" fill="#E8F3EF"/>
  <text x="255" y="398" text-anchor="middle" class="chip">Fast Model</text>
  <rect x="430" y="350" width="210" height="80" rx="30" fill="#EAF3F7"/>
  <text x="535" y="398" text-anchor="middle" class="chip">LLM Reasoning</text>
  <rect x="710" y="350" width="210" height="80" rx="30" fill="#EAF3F7"/>
  <text x="815" y="398" text-anchor="middle" class="chip">Threat Score</text>
  <path d="M360 390H410" stroke="#61C8B3" stroke-width="10" stroke-linecap="round"/>
  <path d="M640 390H690" stroke="#61C8B3" stroke-width="10" stroke-linecap="round"/>
  <text x="150" y="520" class="metric">
    <tspan x="150" dy="0">Elite accuracy.</tspan>
    <tspan x="150" dy="40">Practical compute cost.</tspan>
  </text>
</svg>
